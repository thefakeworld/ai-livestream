name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # ==================== 后端测试 ====================
  backend-test:
    name: 后端测试
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements*.txt
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt
      
      - name: 运行单元测试
        run: pytest tests/ -v --cov=api --cov-report=xml --cov-report=term-missing
      
      - name: 类型检查
        run: mypy api/ --ignore-missing-imports || true
      
      - name: 上传覆盖率报告
        uses: codecov/codecov-action@v3
        with:
          files: backend/coverage.xml
          flags: backend

  # ==================== 前端测试 ====================
  frontend-test:
    name: 前端测试
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: 安装依赖
        run: npm ci
      
      - name: 代码检查
        run: npm run lint
      
      - name: 构建检查
        run: npm run build
      
      - name: 运行测试
        run: npm test || true  # 如果没有测试则跳过

  # ==================== API 契约测试 ====================
  api-contract-test:
    name: API 契约测试
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: 安装依赖
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest httpx
      
      - name: 启动后端服务
        run: |
          cd backend
          uvicorn api.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
      
      - name: 运行契约测试
        run: |
          cd backend
          pytest tests/contract/ -v || true  # 允许失败，因为可能是首次运行

  # ==================== E2E 测试 ====================
  e2e-test:
    name: E2E 测试
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: 安装前端依赖
        run: |
          cd frontend
          npm ci
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: 安装后端依赖
        run: |
          cd backend
          pip install -r requirements.txt
      
      - name: 安装 Playwright
        run: |
          npm install -D @playwright/test
          npx playwright install --with-deps chromium
      
      - name: 启动服务
        run: |
          # 启动后端
          cd backend && uvicorn api.main:app --host 0.0.0.0 --port 8000 &
          
          # 启动前端
          cd ../frontend && npm run dev &
          
          # 等待服务就绪
          sleep 10
      
      - name: 运行 E2E 测试
        run: |
          npx playwright test e2e/ --reporter=list || true  # 允许失败

  # ==================== 构建检查 ====================
  build:
    name: 构建检查
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 检查 Docker 构建 (后端)
        run: |
          docker build -t ai-livestream-backend -f docker/Dockerfile.backend . || echo "Docker 构建跳过"
      
      - name: 检查 Docker 构建 (前端)
        run: |
          docker build -t ai-livestream-frontend -f docker/Dockerfile.frontend . || echo "Docker 构建跳过"

  # ==================== 发布准备 ====================
  release-prep:
    name: 发布准备
    runs-on: ubuntu-latest
    needs: [api-contract-test, e2e-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 生成版本号
        id: version
        run: |
          VERSION=$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: 创建发布标签
        run: |
          git tag -a v${{ steps.version.outputs.version }} -m "Release ${{ steps.version.outputs.version }}"
          git push origin v${{ steps.version.outputs.version }} || true

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
